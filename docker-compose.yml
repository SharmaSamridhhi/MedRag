services:
  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - gateway
    networks:
      - medrag-network

  gateway:
    build: ./gateway
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./gateway:/app
      - /app/node_modules
    environment:
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - ai-service
    networks:
      - medrag-network

  ai-service:
    build: ./ai-service
    env_file:
      - .env
    ports:
      - "8000:8000"
    volumes:
      - ./ai-service:/app
    networks:
      - medrag-network
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg15
    container_name: medrag-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-medrag_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-medrag_pass}
      POSTGRES_DB: ${POSTGRES_DB:-medrag_db}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./ai-service/db/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - medrag-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-medrag_user} -d ${POSTGRES_DB:-medrag_db}",
        ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:

networks:
  medrag-network:
